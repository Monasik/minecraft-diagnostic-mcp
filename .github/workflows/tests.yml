name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e .

      - name: Packaging smoke test
        run: |
          python -c "import minecraft_diagnostic_mcp; print(minecraft_diagnostic_mcp.__version__)"
          python -c "import shutil,sys; sys.exit(0 if shutil.which('minecraft-diagnostic-mcp') else 1)"

      - name: Run tests
        run: python -m unittest discover -s tests -v

  integration-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e .

      - name: Run integration-style smoke subset
        run: |
          python -m unittest tests.test_entrypoint -v
          python -m unittest tests.test_backup_workflow_integration -v
          python -m unittest tests.test_tool_contract_outputs -v
